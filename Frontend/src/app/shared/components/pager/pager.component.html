<nav aria-label="Table navigation">
  <ul class="flex -space-x-px text-sm">
    <li>
      <button
      (click)="onPagerPrevious()"
      [disabled]="currentPage() === 1"
        class="flex items-center justify-center text-body bg-gray-800 box-border border border-default-medium
        hover:bg-(--color-primary)/60 hover:cursor-pointer font-medium rounded-s-box text-sm px-3 h-9 focus:outline-none disabled:bg-gray-800
        disabled:opacity-45 disabled:cursor-not-allowed">Previous</button>
    </li>
    @for (page of pagerList(); track page) {
    <li>
      <a (click)="onPagerClick(page)"
      [class.bg-(--color-primary)]="page === currentPage()"
      [class.bg-gray-800]="page !== currentPage()"
        class="flex items-center justify-center text-body box-border border border-default-medium
        hover:bg-(--color-primary)/60 hover:font-bold font-medium hover:cursor-pointer text-sm w-9 h-9 focus:outline-none">

        {{page}}</a>
    </li>
    }
    <li>
      <button
      [disabled]="currentPage() === pagerList().length"
      (click)="onPagerNext()"
        class="flex items-center justify-center text-body bg-gray-800 box-border border border-default-medium
        hover:bg-(--color-primary)/60 hover:cursor-pointer font-medium rounded-e-box text-sm px-3 h-9 focus:outline-none
        disabled:bg-gray-800 disabled:opacity-45 disabled:cursor-not-allowed">Next</button>
    </li>
  </ul>
</nav>
